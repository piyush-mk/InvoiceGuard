<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#0f1735"/>
  <rect x="30" y="30" width="1140" height="660" rx="14" fill="#121d40" stroke="#364f98"/>
  <rect x="64" y="64" width="1072" height="592" rx="10" fill="#fbfcff"/>
  <text x="96" y="106" fill="#1a2d5d" font-size="33" font-family="Segoe UI, Arial" font-weight="700">AP Policy: Threshold Evasion Controls</text>
  <text x="96" y="134" fill="#566ba4" font-size="17" font-family="Segoe UI, Arial">Policy ID AP-POL-22 " Revision 4.3 " Effective 2025-01-01</text>
  <rect x="96" y="156" width="1040" height="70" rx="10" fill="#fff4db" stroke="#e7b647"/>
  <text x="114" y="186" fill="#7c5200" font-size="17" font-family="Segoe UI, Arial" font-weight="700">Critical Rule</text>
  <text x="114" y="210" fill="#7c5200" font-size="15" font-family="Segoe UI, Arial">Repeated sub-threshold invoices linked to the same PO must be escalated for supervisor review.</text>
  <rect x="96" y="252" width="1040" height="350" rx="10" fill="#f4f7ff" stroke="#d5e0ff"/>
  <text x="118" y="288" fill="#2f4681" font-size="16" font-family="Segoe UI, Arial" font-weight="700">Interpretation Notes</text>
  <text x="118" y="318" fill="#4e639d" font-size="14" font-family="Segoe UI, Arial">1. Pattern signals override single-invoice value checks when recurrence is detected.</text>
  <text x="118" y="342" fill="#4e639d" font-size="14" font-family="Segoe UI, Arial">2. Use PO lineage + receipt timing before final escalation decision.</text>
  <text x="118" y="366" fill="#4e639d" font-size="14" font-family="Segoe UI, Arial">3. Evidence references required: PO, GRN, and duplicate check outputs.</text>
  <text x="118" y="390" fill="#4e639d" font-size="14" font-family="Segoe UI, Arial">4. Analyst explanation must mention threshold-dance indicator.</text>
  <rect x="118" y="426" width="994" height="154" rx="8" fill="#ffffff" stroke="#dbe4ff"/>
  <text x="136" y="458" fill="#2f4681" font-size="15" font-family="Segoe UI, Arial" font-weight="700">Example Trigger</text>
  <text x="136" y="484" fill="#4e639d" font-size="14" font-family="Segoe UI, Arial">Vendor submits two invoices of $9,900 each within one PO cycle while PO authorized $19,800 staged delivery.</text>
  <text x="136" y="508" fill="#4e639d" font-size="14" font-family="Segoe UI, Arial">Outcome: escalate_for_supervisor_review + exception_type=policy_violation.</text>
  <text x="136" y="532" fill="#4e639d" font-size="14" font-family="Segoe UI, Arial">Rationale: threshold splitting pattern despite individually acceptable invoice amounts.</text>
  <rect x="96" y="620" width="250" height="28" rx="14" fill="#e8f0ff" stroke="#8aa4e6"/>
  <text x="112" y="639" fill="#2d4684" font-size="13" font-family="Segoe UI, Arial" font-weight="700">Evidence Tag: inspect_policy_rules</text>
  <rect x="356" y="620" width="345" height="28" rx="14" fill="#fff4db" stroke="#e5b854"/>
  <text x="372" y="639" fill="#7a4f00" font-size="13" font-family="Segoe UI, Arial" font-weight="700">Resolution Tag: submit_final_resolution</text>
</svg>
